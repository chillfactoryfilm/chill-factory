<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CHILL FACTORY</title>
  <meta name="description" content="Chill Factory is the film production company of director Christopher Stoudt. Documentary and branded work for Disney+, Peacock, MSNBC, The New Yorker and more." />
  <!-- Open Graph / social share preview -->
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="CHILL FACTORY" />
  <meta property="og:url" content="https://chillfactoryfilm.com/" />
  <meta property="og:title" content="CHILL FACTORY" />
  <meta property="og:description" content="Documentary storytelling for screens big and small." />
  <meta property="og:image" content="https://chillfactoryfilm.com/assets/og-image.jpg" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="CHILL FACTORY" />
  <meta name="twitter:description" content="Documentary storytelling for screens big and small." />
  <meta name="twitter:image" content="https://chillfactoryfilm.com/assets/og-image.jpg" />
  <!-- Favicon / app icon -->
  <link rel="icon" type="image/png" href="/assets/icon.png" />
  <link rel="apple-touch-icon" href="/assets/icon.png" />
  <link rel="stylesheet" href="css/style.css?v=32" />
</head>
<body>

  <!-- transparent nav sits over the splash video -->
  <header class="nav nav--transparent">
    <a class="brand" href="index.html">Chill Factory</a>
    <button class="nav-toggle" aria-label="Menu">Menu</button>
    <nav class="nav-links">
      <a href="work.html">Work</a>
      <a href="features.html">Collabs</a>
      <a href="about.html">About</a>
      <a href="contact.html">Contact</a>
    </nav>
  </header>

  <!-- SPLASH ------------------------------------------------------------- -->
  <!-- Drop a muted MP4 loop at assets/videos/hero.mp4 to replace the poster.
       Keep the <img> as the poster fallback. -->
  <section class="hero">
    <div id="hero-media" class="hero-media"></div>
    <div class="hero-inner">
      <h1 class="hero-title" data-site="heroTitle">Chill Factory</h1>
      <p class="hero-sub" data-site="heroSub">Documentary storytelling for screens big and small.</p>
      <a class="hero-cta" href="work.html">Work <span aria-hidden="true">&rarr;</span></a>
    </div>
  </section>

  <!-- FOOTER ------------------------------------------------------------- -->
  <footer class="footer">
    <div class="wrap footer-inner">
      <span class="footer-brand"><img src="assets/logo-mark.png" class="footer-mark" alt="" />Chill Factory</span>
      <div class="footer-links">
        <a href="work.html">Work</a>
        <a href="features.html">Collabs</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
      </div>
      <small>© <span id="yr"></span> Chill Factory</small>
    </div>
  </footer>

  <script src="js/site.js?v=32"></script>
  <script>document.getElementById("yr").textContent = new Date().getFullYear();</script>

  <!-- Netlify Identity: lets the CMS invite/login redirect work. Harmless otherwise. -->
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  <script>
    if (window.netlifyIdentity) {
      window.netlifyIdentity.on("init", function (user) {
        if (!user) {
          window.netlifyIdentity.on("login", function () { document.location.href = "/admin/"; });
        }
      });
    }
  </script>
</body>
</html>
